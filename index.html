<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kids Apps">
<title>Kids Apps ✨</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  color: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}
.hero {
  text-align: center;
  margin-bottom: 40px;
}
.hero h1 {
  font-size: 32px;
  font-weight: 800;
  color: #1a1a2e;
  line-height: 1.2;
}
.hero h1 span { color: #5b6ef5; }
.hero p {
  font-size: 16px;
  color: #777;
  margin-top: 8px;
}
.apps {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 560px;
}
.app-card {
  background: white;
  border-radius: 20px;
  padding: 28px 20px;
  text-align: center;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  border: 2px solid transparent;
  transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  cursor: pointer;
}
.app-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(91,110,245,0.15);
  border-color: #5b6ef5;
}
.app-card:active { transform: scale(0.97); }
.app-icon { font-size: 52px; display: block; margin-bottom: 14px; }
.app-name { font-size: 17px; font-weight: 700; color: #1a1a2e; }
.app-desc { font-size: 13px; color: #999; margin-top: 5px; line-height: 1.4; }
.badge {
  display: inline-block;
  background: #eef0ff;
  color: #5b6ef5;
  font-size: 11px;
  font-weight: 600;
  border-radius: 20px;
  padding: 3px 10px;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="hero">
  <h1>Kids <span>Apps</span> ✨</h1>
  <p>Fun stuff, just for you</p>
</div>
<div class="apps">
  <a class="app-card" href="story-builder.html">
    <span class="app-icon">📖</span>
    <div class="app-name">Story Builder</div>
    <div class="app-desc">Create your own adventure, one choice at a time!</div>
    <div class="badge">Story</div>
  </a>
  <a class="app-card" href="kids-chatbot.html">
    <span class="app-icon">💬</span>
    <div class="app-name">Character Chat</div>
    <div class="app-desc">Talk to your favorite cartoon and game characters!</div>
    <div class="badge">Chat</div>
  </a>
  <a class="app-card" href="joke-lab.html">
    <span class="app-icon">😂</span>
    <div class="app-name">Joke Lab</div>
    <div class="app-desc">Pick a topic and get ready to laugh!</div>
    <div class="badge">Jokes</div>
  </a>
</div>
<script src="config.js" onerror="void 0"></script>
<script src="header.js"></script>
</body>
</html>
